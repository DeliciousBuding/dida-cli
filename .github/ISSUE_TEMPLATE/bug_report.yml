name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Share enough detail to reproduce the bug. Do not paste live cookies, bearer tokens, or private task exports.

  - type: input
    id: version
    attributes:
      label: DidaCLI Version
      description: Output of `dida version`
      placeholder: "vX.Y.Z from dida version"
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Auth Channel
      description: Which channel were you using?
      options:
        - Web API (cookie)
        - Official MCP (token)
        - Official OpenAPI (OAuth)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: The command that triggered the bug
      render: bash
      placeholder: "dida task create --project xxx --title 'test' --json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste the error or unexpected output.
      render: json
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste the output of `dida doctor --json` after redacting any tokens.
      render: json

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information
