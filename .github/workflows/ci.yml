name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOVULNCHECK_VERSION: v1.3.0
  ACTIONLINT_VERSION: v1.7.12
  STATICCHECK_VERSION: v0.7.0

jobs:
  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "24"

      - name: Check formatting
        run: |
          git ls-files '*.go' | xargs gofmt -w
          git diff --check
          git diff --exit-code

      - name: Check private state
        run: bash scripts/check-private-state.sh

      - name: Test private-state guard
        run: bash scripts/check-private-state.test.sh

      - name: Validate packaging templates
        run: bash scripts/validate-packaging.sh --metadata-only

      - name: Test packaging validator
        run: bash scripts/validate-packaging.test.sh

      - name: Test release archive verifier
        run: bash scripts/verify-release-archives.test.sh

      - name: Test release metadata validator
        run: bash scripts/validate-release-metadata.test.sh

      - name: Test changelog validator
        run: bash scripts/validate-changelog.test.sh

      - name: Test release notes generator
        run: bash scripts/generate-release-notes.test.sh

      - name: Test npm package validator
        run: bash scripts/validate-npm-package.test.sh

      - name: Test repository governance validator
        run: bash scripts/validate-repo-governance.test.sh

      - name: Test pinned action validator
        run: bash scripts/validate-actions-pinned.test.sh

      - name: Lint workflows
        run: go run "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"

  test:
    name: Go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Test
        run: |
          mkdir -p coverage
          go test -race -count=1 -coverprofile=coverage/profile.txt ./...
        shell: bash

      - name: Coverage summary
        run: go tool cover -func=coverage/profile.txt
        shell: bash

  vet:
    name: Go vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Staticcheck
        run: go run "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}" ./...

  vuln:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Vulnerability check
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - goos: windows
            goarch: amd64
            binary: dida.exe
          - goos: windows
            goarch: arm64
            binary: dida.exe
          - goos: linux
            goarch: amd64
            binary: dida
          - goos: linux
            goarch: arm64
            binary: dida
          - goos: darwin
            goarch: amd64
            binary: dida
          - goos: darwin
            goarch: arm64
            binary: dida
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o bin/${{ matrix.goos }}-${{ matrix.goarch }}/${{ matrix.binary }} ./cmd/dida
