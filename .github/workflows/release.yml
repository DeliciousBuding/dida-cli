name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist

          build_one() {
            local os="$1"
            local arch="$2"
            local ext=""
            local bin="dida"
            if [[ "$os" == "windows" ]]; then
              ext=".exe"
              bin="dida.exe"
            fi

            local work="dist/dida_${version}_${os}_${arch}"
            mkdir -p "$work"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "$work/$bin" ./cmd/dida

            if [[ "$os" == "windows" ]]; then
              (cd dist && zip -qr "dida_${version}_${os}_${arch}.zip" "dida_${version}_${os}_${arch}")
            else
              (cd dist && tar -czf "dida_${version}_${os}_${arch}.tar.gz" "dida_${version}_${os}_${arch}")
            fi
            rm -rf "$work"
          }

          build_one windows amd64
          build_one windows arm64
          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64

          (cd dist && sha256sum *.zip *.tar.gz > checksums.txt)

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          base_url="https://github.com/${repo}/releases/download/${version}"

          # Try to extract this version's section from CHANGELOG.md
          changelog_section=""
          if [[ -f CHANGELOG.md ]]; then
            changelog_section=$(awk -v ver="$version" '
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]")) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md)
          fi

          # Build the release notes
          cat > release-notes.md <<'NOTES_EOF'
## What's Changed

NOTES_EOF

          if [[ -n "$changelog_section" ]]; then
            echo "$changelog_section" >> release-notes.md
          else
            prev_tag=$(git tag --sort=-v:refname | grep -A1 "^${version}$" | tail -1)
            if [[ -n "$prev_tag" && "$prev_tag" != "$version" ]]; then
              echo "Changes since ${prev_tag}:" >> release-notes.md
              echo "" >> release-notes.md
              git log --oneline --no-merges "${prev_tag}..${version}" | while read -r line; do
                echo "- ${line}" >> release-notes.md
              done
            else
              git log --oneline -20 | while read -r line; do
                echo "- ${line}" >> release-notes.md
              done
            fi
          fi

          # Platform download table
          cat >> release-notes.md <<'TABLE_EOF'

---

## Downloads

| Platform | File | Install |
|---|---|---|
| **macOS** (Apple Silicon) | [dida___VER___darwin_arm64.tar.gz](BASE_URL/dida___VER___darwin_arm64.tar.gz) | `curl -fsSL ...install.sh \| sh` |
| **macOS** (Intel) | [dida___VER___darwin_amd64.tar.gz](BASE_URL/dida___VER___darwin_amd64.tar.gz) | `curl -fsSL ...install.sh \| sh` |
| **Linux** (x86_64) | [dida___VER___linux_amd64.tar.gz](BASE_URL/dida___VER___linux_amd64.tar.gz) | `curl -fsSL ...install.sh \| sh` |
| **Linux** (ARM64) | [dida___VER___linux_arm64.tar.gz](BASE_URL/dida___VER___linux_arm64.tar.gz) | `curl -fsSL ...install.sh \| sh` |
| **Windows** (x86_64) | [dida___VER___windows_amd64.zip](BASE_URL/dida___VER___windows_amd64.zip) | Scoop / PowerShell |
| **Windows** (ARM64) | [dida___VER___windows_arm64.zip](BASE_URL/dida___VER___windows_arm64.zip) | Scoop / PowerShell |

### Quick Install

**npm:**
```bash
npm install -g @delicious233/dida-cli
```

**macOS / Linux:**
```bash
curl -fsSL https://raw.githubusercontent.com/REPO_PLACEHOLDER/main/install.sh | sh
```

**Windows PowerShell:**
```powershell
iwr https://raw.githubusercontent.com/REPO_PLACEHOLDER/main/install.ps1 -UseB | iex
```

**Go:**
```bash
go install github.com/REPO_PLACEHOLDER/cmd/dida@latest
```

**Self-update:**
```bash
dida upgrade
```

### Verify

```bash
dida version
dida doctor --json
```

SHA-256 checksums are in [`checksums.txt`](BASE_URL/checksums.txt).
TABLE_EOF

          # Replace placeholders
          sed -i "s|__VER__|${version}|g" release-notes.md
          sed -i "s|BASE_URL|${base_url}|g" release-notes.md
          sed -i "s|REPO_PLACEHOLDER|${repo}|g" release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "DidaCLI ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update package version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm && npm version "$VERSION" --no-git-tag-version

      - name: Publish
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
