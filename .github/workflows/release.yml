name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist

          build_one() {
            local os="$1"
            local arch="$2"
            local ext=""
            local bin="dida"
            if [[ "$os" == "windows" ]]; then
              ext=".exe"
              bin="dida.exe"
            fi

            local work="dist/dida_${version}_${os}_${arch}"
            mkdir -p "$work"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "$work/$bin" ./cmd/dida

            if [[ "$os" == "windows" ]]; then
              (cd dist && zip -qr "dida_${version}_${os}_${arch}.zip" "dida_${version}_${os}_${arch}")
            else
              (cd dist && tar -czf "dida_${version}_${os}_${arch}.tar.gz" "dida_${version}_${os}_${arch}")
            fi
            rm -rf "$work"
          }

          build_one windows amd64
          build_one windows arm64
          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64

          (cd dist && sha256sum *.zip *.tar.gz > checksums.txt)

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"

          # Try to extract this version's section from CHANGELOG.md
          changelog_section=""
          if [[ -f CHANGELOG.md ]]; then
            # Extract the section for this version (between ## [version] and the next ##)
            changelog_section=$(awk -v ver="$version" '
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]")) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md)
          fi

          # Build the release notes
          cat > release-notes.md <<NOTES_EOF
          ## What's Changed

          NOTES_EOF

          if [[ -n "$changelog_section" ]]; then
            echo "$changelog_section" >> release-notes.md
          else
            # Fallback: generate from commits since last tag
            prev_tag=$(git tag --sort=-v:refname | grep -A1 "^${version}$" | tail -1)
            if [[ -n "$prev_tag" && "$prev_tag" != "$version" ]]; then
              echo "### Changes since ${prev_tag}" >> release-notes.md
              echo "" >> release-notes.md
              git log --oneline --no-merges "${prev_tag}..${version}" | while read -r line; do
                echo "- ${line}" >> release-notes.md
              done
            else
              git log --oneline -20 | while read -r line; do
                echo "- ${line}" >> release-notes.md
              done
            fi
          fi

          cat >> release-notes.md <<'INSTALL_EOF'

          ---

          ## Install

          **macOS / Linux:**

          ```bash
          curl -fsSL https://raw.githubusercontent.com/DeliciousBuding/dida-cli/main/install.sh | sh
          ```

          **Windows PowerShell:**

          ```powershell
          iwr https://raw.githubusercontent.com/DeliciousBuding/dida-cli/main/install.ps1 -UseB | iex
          ```

          **Go:**

          ```bash
          go install github.com/DeliciousBuding/dida-cli/cmd/dida@latest
          ```
          INSTALL_EOF

          # Append version-specific pin instructions
          cat >> release-notes.md <<PIN_EOF

          <details>
          <summary>Pin this version</summary>

          ```bash
          DIDA_VERSION=${version} curl -fsSL https://raw.githubusercontent.com/DeliciousBuding/dida-cli/main/install.sh | sh
          ```

          ```powershell
          \$env:DIDA_VERSION="${version}"; iwr https://raw.githubusercontent.com/DeliciousBuding/dida-cli/main/install.ps1 -UseB | iex
          ```
          </details>

          **Verify after install:**

          ```bash
          dida version
          dida doctor --json
          ```

          Checksums are attached as \`checksums.txt\`.
          PIN_EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "DidaCLI ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
