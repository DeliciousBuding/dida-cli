name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      allow_changelog_fallback:
        description: "Allow release notes from git log when CHANGELOG.md has no tag section"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  GOVULNCHECK_VERSION: v1.3.0

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    env:
      ALLOW_CHANGELOG_FALLBACK: ${{ github.event.inputs.allow_changelog_fallback || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          args=(--tag "${GITHUB_REF_NAME}")
          if [[ "${ALLOW_CHANGELOG_FALLBACK}" == "true" ]]; then
            args+=(--allow-changelog-fallback)
          fi
          bash scripts/validate-release-metadata.sh "${args[@]}"
          if [[ "${ALLOW_CHANGELOG_FALLBACK}" != "true" ]]; then
            bash scripts/validate-changelog.sh --tag "${GITHUB_REF_NAME}"
          fi

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Check formatting
        run: |
          git ls-files '*.go' | xargs gofmt -w
          git diff --check
          git diff --exit-code

      - name: Check private state
        run: bash scripts/check-private-state.sh

      - name: Test private-state guard
        run: bash scripts/check-private-state.test.sh

      - name: Validate pinned actions
        run: bash scripts/validate-actions-pinned.sh

      - name: Validate packaging templates
        run: bash scripts/validate-packaging.sh --metadata-only

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary: dida.exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            binary: dida.exe
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary: dida
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary: dida
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary: dida
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary: dida
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BINARY: ${{ matrix.binary }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="dida_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${name}"
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${name}/${BINARY}" ./cmd/dida
          if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
            (cd dist && zip -qr "${name}.zip" "${name}")
          else
            (cd dist && tar -czf "${name}.tar.gz" "${name}")
          fi

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dida-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/dida_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  npm-preflight:
    name: npm preflight
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Check npm release readiness
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bash scripts/validate-npm-package.sh --version "${GITHUB_REF_NAME}"
          if npm view @delicious233/dida-cli@"$version" version >/dev/null 2>&1; then
            echo "@delicious233/dida-cli@$version already exists on npm; publish job will skip upload after package validation"
          else
            if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
              echo "NPM_TOKEN is not set; publish job will rely on npm Trusted Publishing/OIDC"
            elif ! npm whoami >/dev/null 2>&1; then
              echo "NPM_TOKEN is invalid for npm registry authentication" >&2
              exit 1
            fi
          fi

  release:
    name: Create GitHub release
    needs:
      - build
      - npm-preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ALLOW_CHANGELOG_FALLBACK: ${{ github.event.inputs.allow_changelog_fallback || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify archives
        shell: bash
        run: bash scripts/verify-release-archives.sh "${GITHUB_REF_NAME}" dist

      - name: Smoke test Linux binary
        shell: bash
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          archive="dist/dida_${GITHUB_REF_NAME}_linux_amd64.tar.gz"
          tar -xzf "$archive" -C "$work"
          got="$("$work/dida_${GITHUB_REF_NAME}_linux_amd64/dida" version | tr -d '\r\n')"
          if [[ "$got" != "$GITHUB_REF_NAME" ]]; then
            echo "binary version mismatch: got ${got}, want ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.zip ./*.tar.gz | sed 's|  \./|  |' > checksums.txt

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          args=(--tag "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --output release-notes.md)
          if [[ "${ALLOW_CHANGELOG_FALLBACK}" == "true" ]]; then
            args+=(--allow-changelog-fallback)
          fi
          bash scripts/generate-release-notes.sh "${args[@]}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip dist/*.tar.gz dist/checksums.txt --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "DidaCLI ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/*.tar.gz dist/checksums.txt \
              --verify-tag \
              --title "DidaCLI ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi

  npm-install-smoke:
    name: npm install smoke (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Pack npm package
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cd npm
          npm version "$version" --no-git-tag-version --allow-same-version
          npm pack --pack-destination "$RUNNER_TEMP"
          tarball="$(find "$RUNNER_TEMP" -maxdepth 1 -name 'delicious233-dida-cli-*.tgz' -print -quit)"
          if [[ -z "$tarball" ]]; then
            echo "npm pack did not create a tarball in ${RUNNER_TEMP}" >&2
            exit 1
          fi
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Install package and smoke binary
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/dida-npm-smoke"
          rm -rf "$work"
          mkdir -p "$work"
          cd "$work"
          npm init -y >/dev/null
          npm install "${{ steps.pack.outputs.tarball }}"
          got="$(npx --no-install dida version | tr -d '\r\n')"
          if [[ "$got" != "$GITHUB_REF_NAME" ]]; then
            echo "npm-installed dida version mismatch: got ${got}, want ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          npx --no-install dida doctor --json >/dev/null

  npm-publish:
    name: Publish to npm
    needs: npm-install-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm package
        id: prepare
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bash scripts/validate-npm-package.sh --version "${GITHUB_REF_NAME}"
          if npm view @delicious233/dida-cli@"$version" version >/dev/null 2>&1; then
            echo "@delicious233/dida-cli@$version already exists on npm; skipping npm publish"
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          elif ! npm whoami >/dev/null 2>&1; then
            if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
              echo "No NPM_TOKEN detected; attempting npm Trusted Publishing/OIDC in the publish step"
              echo "already_published=false" >> "$GITHUB_OUTPUT"
              echo "auth_mode=trusted-publishing" >> "$GITHUB_OUTPUT"
            else
              echo "NPM_TOKEN is invalid for npm registry authentication" >&2
              exit 1
            fi
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "auth_mode=token" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.prepare.outputs.already_published != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.prepare.outputs.auth_mode }}" == "trusted-publishing" ]]; then
            unset NODE_AUTH_TOKEN
            echo "Publishing through npm Trusted Publishing/OIDC"
          else
            echo "Publishing through NPM_TOKEN fallback"
          fi
          cd npm
          npm publish --provenance --access public
