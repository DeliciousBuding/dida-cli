<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">DidaCLI README hero</title>
  <desc id="desc">A clean terminal-first hero for DidaCLI, an agent-friendly command line client for Dida365 and TickTick with stable JSON output.</desc>

  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.52" stop-color="#0D1222"/>
      <stop offset="1" stop-color="#101728"/>
    </linearGradient>

    <radialGradient id="blue-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 246) rotate(31.3) scale(420 290)">
      <stop offset="0" stop-color="#4772FA" stop-opacity="0.22"/>
      <stop offset="0.52" stop-color="#4772FA" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#4772FA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="gold-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(991 420) rotate(25.5) scale(300 220)">
      <stop offset="0" stop-color="#FFB000" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#FFB000" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFB000" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dot-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#8EA0C3" opacity="0.18"/>
    </pattern>

    <linearGradient id="terminal-gradient" x1="894" y1="118" x2="894" y2="510" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151B2B"/>
      <stop offset="1" stop-color="#121725"/>
    </linearGradient>

    <linearGradient id="terminal-stroke" x1="624" y1="118" x2="1164" y2="510" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#344466" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#26324A" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#4772FA" stop-opacity="0.24"/>
    </linearGradient>

    <linearGradient id="icon-shell" x1="96" y1="124" x2="180" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D91FF"/>
      <stop offset="1" stop-color="#4772FA"/>
    </linearGradient>

    <linearGradient id="check-gradient" x1="157" y1="132" x2="211" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD36A"/>
      <stop offset="1" stop-color="#FFB000"/>
    </linearGradient>

    <filter id="terminal-shadow" x="574" y="76" width="640" height="492" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#050814" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#4772FA" flood-opacity="0.14"/>
    </filter>

    <filter id="soft-blue" x="40" y="76" width="230" height="190" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#4772FA" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Background -->
  <g id="background">
    <rect width="1280" height="640" fill="url(#bg-gradient)"/>
    <rect width="1280" height="640" fill="url(#blue-glow)"/>
    <rect width="1280" height="640" fill="url(#gold-glow)"/>
    <rect width="1280" height="640" fill="url(#dot-grid)" opacity="0.18"/>
    <path d="M92 548H1188" stroke="#8EA0C3" stroke-opacity="0.055"/>
    <path d="M92 92H1188" stroke="#8EA0C3" stroke-opacity="0.04"/>
  </g>

  <!-- Brand -->
  <g id="brand" transform="translate(92 126)">
    <g id="brand-icon" filter="url(#soft-blue)">
      <rect x="0" y="0" width="88" height="88" rx="22" fill="#11182A"/>
      <rect x="0.75" y="0.75" width="86.5" height="86.5" rx="21.25" stroke="#4772FA" stroke-opacity="0.42" stroke-width="1.5"/>
      <path d="M24 30L39 44L24 58" stroke="url(#icon-shell)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 60H66" stroke="url(#icon-shell)" stroke-width="7" stroke-linecap="round"/>
      <path d="M53 28L63.5 39L82 18" stroke="url(#check-gradient)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="72" cy="66" r="4.5" fill="#FFB000"/>
    </g>

    <text x="0" y="158"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif"
      font-size="84" font-weight="800" letter-spacing="-1.8" fill="#FFFFFF">
      Dida<tspan fill="#4772FA">CLI</tspan>
    </text>

    <text x="4" y="213"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif"
      font-size="25" font-weight="500" letter-spacing="0" fill="#8EA0C3">
      <tspan x="4" dy="0">Agent-friendly task automation</tspan>
      <tspan x="4" dy="36">for Dida365 / TickTick</tspan>
    </text>

    <g id="brand-tags" transform="translate(4 292)"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif"
      font-size="15" font-weight="650" letter-spacing="0" fill="#D7E0F5">
      <g>
        <rect x="0" y="0" width="108" height="36" rx="18" fill="#121725" fill-opacity="0.74" stroke="#26324A" stroke-opacity="0.82"/>
        <text x="22" y="23">JSON-first</text>
      </g>
      <g transform="translate(124 0)">
        <rect x="0" y="0" width="124" height="36" rx="18" fill="#121725" fill-opacity="0.74" stroke="#26324A" stroke-opacity="0.82"/>
        <text x="20" y="23">Dry-run safe</text>
      </g>
      <g transform="translate(264 0)">
        <rect x="0" y="0" width="92" height="36" rx="18" fill="#121725" fill-opacity="0.74" stroke="#26324A" stroke-opacity="0.82"/>
        <text x="18" y="23">Zero deps</text>
      </g>
    </g>
  </g>

  <!-- Terminal -->
  <g id="terminal" filter="url(#terminal-shadow)">
    <rect x="624" y="118" width="540" height="392" rx="20" fill="url(#terminal-gradient)"/>
    <rect x="624.75" y="118.75" width="538.5" height="390.5" rx="19.25" stroke="url(#terminal-stroke)" stroke-width="1.5"/>

    <g id="terminal-titlebar">
      <path d="M645 161C645 148.85 654.85 139 667 139H1121C1133.15 139 1143 148.85 1143 161V171H645V161Z" fill="#0F1524" fill-opacity="0.38"/>
      <circle cx="670" cy="156" r="5.5" fill="#FF5F57" opacity="0.72"/>
      <circle cx="690" cy="156" r="5.5" fill="#FFB000" opacity="0.72"/>
      <circle cx="710" cy="156" r="5.5" fill="#2ED573" opacity="0.72"/>
      <text x="894" y="162" text-anchor="middle"
        font-family="JetBrains Mono, SFMono-Regular, Consolas, &quot;Liberation Mono&quot;, monospace"
        font-size="14" font-weight="600" letter-spacing="0" fill="#8EA0C3" opacity="0.72">dida-cli</text>
    </g>

    <g id="terminal-code"
      font-family="JetBrains Mono, SFMono-Regular, Consolas, &quot;Liberation Mono&quot;, monospace"
      font-size="20" font-weight="500" letter-spacing="0">
      <text x="668" y="212">
        <tspan fill="#4772FA">$</tspan><tspan fill="#D7E0F5"> dida +today --json</tspan>
      </text>

      <text x="668" y="260" fill="#D7E0F5">{</text>
      <text x="690" y="288">
        <tspan fill="#8EA0C3">"ok"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">true</tspan><tspan fill="#D7E0F5">,</tspan>
      </text>
      <text x="690" y="316">
        <tspan fill="#8EA0C3">"command"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">"task today"</tspan><tspan fill="#D7E0F5">,</tspan>
      </text>
      <text x="690" y="344">
        <tspan fill="#8EA0C3">"meta"</tspan><tspan fill="#D7E0F5">: { </tspan><tspan fill="#8EA0C3">"count"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">3</tspan><tspan fill="#D7E0F5"> },</tspan>
      </text>
      <text x="690" y="372">
        <tspan fill="#8EA0C3">"data"</tspan><tspan fill="#D7E0F5">: {</tspan>
      </text>
      <text x="712" y="400">
        <tspan fill="#8EA0C3">"tasks"</tspan><tspan fill="#D7E0F5">: [</tspan>
      </text>
      <text x="734" y="428">
        <tspan fill="#D7E0F5">{ </tspan><tspan fill="#8EA0C3">"title"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">"Review PR"</tspan><tspan fill="#D7E0F5">, </tspan><tspan fill="#8EA0C3">"priority"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">1</tspan><tspan fill="#D7E0F5"> },</tspan>
      </text>
      <text x="734" y="456">
        <tspan fill="#D7E0F5">{ </tspan><tspan fill="#8EA0C3">"title"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">"Ship release"</tspan><tspan fill="#D7E0F5">, </tspan><tspan fill="#8EA0C3">"priority"</tspan><tspan fill="#D7E0F5">: </tspan><tspan fill="#FFB000">3</tspan><tspan fill="#D7E0F5"> }</tspan>
      </text>
      <text x="712" y="484" fill="#D7E0F5">]</text>
      <rect x="1112" y="471" width="12" height="22" rx="2" fill="#4772FA"/>
    </g>
  </g>

  <!-- Decorative details -->
  <g id="decorative-details" opacity="0.78">
    <path d="M560 180C588 172 606 152 624 128" stroke="#4772FA" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M1164 452C1185 446 1201 430 1210 407" stroke="#FFB000" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="555" cy="182" r="3" fill="#4772FA" opacity="0.7"/>
    <circle cx="1209" cy="407" r="3" fill="#FFB000" opacity="0.72"/>
  </g>
</svg>
