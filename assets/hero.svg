<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0f1a"/>
      <stop offset="50%" stop-color="#10141f"/>
      <stop offset="100%" stop-color="#0e1220"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.25" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#4772FA" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4772FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.78" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="#4772FA" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4772FA" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b28"/>
      <stop offset="100%" stop-color="#121620"/>
    </linearGradient>
    <linearGradient id="logoBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a8aff"/>
      <stop offset="100%" stop-color="#3164f8"/>
    </linearGradient>
    <linearGradient id="logoGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#FFB000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glowA)"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>

  <!-- Subtle grid -->
  <g opacity="0.025" stroke="#6b8cc7" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- ===== LEFT: Brand (x: 70 – 560) ===== -->

  <!-- Logo icon -->
  <g transform="translate(70, 100) scale(0.26)">
    <path d="M176.483,414.386l353.023.187c19.937.011,33.665-17.606,33.688-36.215l.111-91.919c.013-10.867,9.187-18.879,18.962-19.042,10.255-.171,20.421,7.47,20.392,18.975l-.244,99.375c-.107,43.5-36.677,70.77-77.882,70.755l-343.804-.124c-39.552-.014-76.562-28.211-76.561-70.456l.006-317.531c0-36.533,33.02-68.057,69.031-68.087L538.099,0c19.542-.016,37.53,10.024,49.456,24.186,10.924,12.973,15.752,29.424,15.068,45.987-.435,10.541-8.226,18.161-17.551,19.166-9.072.978-20.341-4.122-21.317-14.904-1.547-17.071-13.952-33.382-33.346-33.379l-353.511.066c-18.769.003-32.996,16.531-32.992,34.347l.057,304.1c.003,17.476,13.455,34.807,32.52,34.817Z" fill="url(#logoBlue)"/>
    <path d="M454.246,303.082l-64.973-73.213c-7.819-8.811-4.327-22.633,4.769-28.887,8.162-4.709,17.385-4.3,24.925,1.146l49.916,51.581,141.775-152.254c4.138-4.444,11.782-1.931,15.42,1.252l18.093,17.113c2.457,2.324,3.293,8.667.433,11.704l-162.579,172.646c-8.97,5.526-19.042,5.239-27.78-1.088Z" fill="url(#logoGold)"/>
    <polygon points="206.262 285.571 205.573 251.074 263.407 213.697 205.255 174.937 205.567 140.468 298.242 200.889 298.168 226.618 206.262 285.571" fill="url(#logoBlue)"/>
    <rect x="297.808" y="274.365" width="75.019" height="25.816" fill="url(#logoBlue)"/>
  </g>

  <!-- Title -->
  <text x="190" y="175" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="68" fill="white" letter-spacing="-2">Dida</text>
  <text x="346" y="175" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="68" fill="#4772FA" letter-spacing="-2">CLI</text>

  <!-- Tagline — fits within x:190–560 -->
  <text x="192" y="218" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="17" fill="#8899b8">A clean, agent-friendly CLI</text>
  <text x="192" y="242" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="17" fill="#8899b8">for Dida365 / TickTick</text>

  <!-- Badges -->
  <g transform="translate(192, 262)">
    <rect x="0" y="0" width="48" height="22" rx="4" fill="#4772FA" opacity="0.85"/>
    <text x="24" y="15" font-family="Inter, system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700">Go</text>
    <rect x="56" y="0" width="28" height="22" rx="4" fill="#FFB000"/>
    <text x="70" y="15" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#0c0f1a" text-anchor="middle" font-weight="700">CI</text>
    <rect x="92" y="0" width="38" height="22" rx="4" fill="#1c2235" stroke="#283050" stroke-width="0.5"/>
    <text x="111" y="15" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8899b8" text-anchor="middle" font-weight="600">MIT</text>
    <rect x="138" y="0" width="48" height="22" rx="4" fill="#1c2235" stroke="#283050" stroke-width="0.5"/>
    <text x="162" y="15" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8899b8" text-anchor="middle" font-weight="600">v0.2.0</text>
  </g>

  <!-- ===== RIGHT: Terminal (x: 600–1230) ===== -->
  <g transform="translate(600, 60)">
    <!-- Terminal shadow -->
    <rect x="2" y="6" width="610" height="460" rx="14" fill="#4772FA" opacity="0.04" filter="url(#blur)"/>
    <!-- Terminal body -->
    <rect width="610" height="456" rx="12" fill="url(#termBg)" stroke="#222c42" stroke-width="0.75"/>
    <!-- Title bar -->
    <rect width="610" height="36" rx="12" fill="#151a28"/>
    <rect y="12" width="610" height="24" fill="#151a28"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8"/>
    <circle cx="38" cy="18" r="5" fill="#febc2e" opacity="0.8"/>
    <circle cx="56" cy="18" r="5" fill="#28c840" opacity="0.8"/>
    <text x="305" y="23" font-family="JetBrains Mono, Consolas, monospace" font-size="11" fill="#4a5570" text-anchor="middle">dida-cli</text>

    <!-- CMD 1: dida task today -->
    <text x="20" y="68" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#4772FA">$ </text>
    <text x="40" y="68" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#d0daf0">dida task today --json</text>

    <text x="20" y="94" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">{</text>
    <text x="34" y="114" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#7d92b8">"ok"</text>
    <text x="68" y="114" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">: </text>
    <text x="84" y="114" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">true,</text>
    <text x="34" y="134" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#7d92b8">"tasks"</text>
    <text x="104" y="134" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">: [</text>
    <text x="50" y="154" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">{ "title": </text>
    <text x="156" y="154" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">"写周报"</text>
    <text x="224" y="154" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">, "project": </text>
    <text x="340" y="154" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">"工作"</text>
    <text x="392" y="154" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0"> },</text>
    <text x="50" y="174" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">{ "title": </text>
    <text x="156" y="174" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">"Review PR #42"</text>
    <text x="280" y="174" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0"> },</text>
    <text x="50" y="194" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">{ "title": </text>
    <text x="156" y="194" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">"买菜"</text>
    <text x="210" y="194" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">, "project": </text>
    <text x="322" y="194" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">"生活"</text>
    <text x="374" y="194" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0"> }</text>
    <text x="34" y="214" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">]</text>
    <text x="34" y="234" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">}</text>

    <!-- Divider -->
    <line x1="20" y1="252" x2="590" y2="252" stroke="#222c42" stroke-width="0.5"/>

    <!-- CMD 2: dida task create -->
    <text x="20" y="280" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#4772FA">$ </text>
    <text x="40" y="280" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#d0daf0">dida task create --project 工作 \</text>
    <text x="40" y="300" font-family="JetBrains Mono, Consolas, monospace" font-size="13" fill="#d0daf0">    --title "Fix login bug" --dry-run</text>

    <text x="20" y="328" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">{</text>
    <text x="34" y="348" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#7d92b8">"ok"</text>
    <text x="68" y="348" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">: </text>
    <text x="84" y="348" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">true,</text>
    <text x="34" y="368" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#7d92b8">"dry_run"</text>
    <text x="118" y="368" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">: </text>
    <text x="134" y="368" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#FFB000">true</text>
    <text x="20" y="388" font-family="JetBrains Mono, Consolas, monospace" font-size="12" fill="#d0daf0">}</text>

    <!-- Cursor -->
    <rect x="20" y="402" width="8" height="16" rx="1" fill="#4772FA" opacity="0.75"/>
  </g>

  <!-- ===== BOTTOM: Feature Pills ===== -->
  <g transform="translate(340, 550)">
    <rect x="0" y="0" width="152" height="34" rx="17" fill="#151a28" stroke="#283050" stroke-width="0.6"/>
    <circle cx="22" cy="17" r="3.5" fill="#4772FA" opacity="0.7"/>
    <text x="34" y="21.5" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8899b8" font-weight="500">30+ Commands</text>

    <rect x="168" y="0" width="134" height="34" rx="17" fill="#151a28" stroke="#283050" stroke-width="0.6"/>
    <circle cx="190" cy="17" r="3.5" fill="#FFB000" opacity="0.7"/>
    <text x="202" y="21.5" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8899b8" font-weight="500">Agent-safe</text>

    <rect x="318" y="0" width="154" height="34" rx="17" fill="#151a28" stroke="#283050" stroke-width="0.6"/>
    <circle cx="340" cy="17" r="3.5" fill="#4772FA" opacity="0.7"/>
    <text x="352" y="21.5" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8899b8" font-weight="500">Three Channels</text>

    <rect x="488" y="0" width="122" height="34" rx="17" fill="#151a28" stroke="#283050" stroke-width="0.6"/>
    <circle cx="510" cy="17" r="3.5" fill="#FFB000" opacity="0.7"/>
    <text x="522" y="21.5" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8899b8" font-weight="500">Zero Deps</text>
  </g>

  <!-- Bottom line -->
  <line x1="0" y1="639" x2="1280" y2="639" stroke="#4772FA" stroke-width="0.75" opacity="0.1"/>
</svg>
